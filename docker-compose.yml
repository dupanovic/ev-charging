services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ev_charging
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  simulation-service:
    build: ./backend/simulation-service
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"

  api:
    build: ./backend/api
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ev_charging
      SIMULATION_SERVICE_URL: http://simulation-service:3001
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma db push --skip-generate && npx tsx src/server.ts"

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pgdata:
